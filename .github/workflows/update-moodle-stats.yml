name: Update Moodle plugin stats

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README stats table
        env:
          MOODLE_TOKEN: ${{ secrets.MOODLE_TOKEN }}
          MOODLE_PLUGINS: tiny_justify,mod_imagemap,tool_sentry
          README_PATH: README.md
        run: python .github/scripts/update_moodle_stats.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update Moodle plugin stats table"
          git push